name: Admin – Staging Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (any branch allowed for staging)'
        required: true
        default: 'staging'
        type: string
      confirm:
        description: 'Type "deploy" to confirm staging deployment'
        required: true
        type: string

jobs:
  # ── 1. Security & Vulnerability Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Dependency vulnerability scan
        run: yarn audit --level high || true

      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: table

  # ── 2. Build & Type Check ─────────────────────────────────────────────────────
  test:
    name: Lint & Build Check
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn workspace @marvel/admin-rest lint || true

      - name: Build check (staging env)
        env:
          APPLICATION_MODE: staging
          NEXT_PUBLIC_REST_API_ENDPOINT: https://plantathome-production.up.railway.app/api
          NEXT_PUBLIC_SHOP_URL: https://plantathome-shop-staging.vercel.app
          NEXT_PUBLIC_VERSION: REST
          NEXT_PUBLIC_AUTH_TOKEN_KEY: AUTH_CRED
          NEXT_PUBLIC_DEFAULT_LANGUAGE: en
          NEXT_PUBLIC_AVAILABLE_LANGUAGES: en
          NEXT_PUBLIC_ENABLE_MULTI_LANG: 'false'
          NEXT_PUBLIC_PUSHER_ENABLED: 'false'
          NODE_OPTIONS: '--max-old-space-size=6144'
        run: yarn build:rest

  # ── 3. Deploy to Vercel (Staging) ─────────────────────────────────────────────
  deploy:
    name: Deploy → Vercel (Staging Admin)
    runs-on: ubuntu-latest
    needs: [security, test]
    if: inputs.confirm == 'deploy'
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel
        working-directory: rest
        run: |
          npx vercel --token "$VERCEL_TOKEN" \
            --yes --prod \
            --build-env "APPLICATION_MODE=staging" \
            --build-env "NEXT_PUBLIC_REST_API_ENDPOINT=https://plantathome-production.up.railway.app/api" \
            --build-env "NEXT_PUBLIC_SHOP_URL=https://plantathome-shop-staging.vercel.app" \
            --build-env "NEXT_PUBLIC_VERSION=REST" \
            --build-env "NEXT_PUBLIC_AUTH_TOKEN_KEY=AUTH_CRED" \
            --build-env "NEXT_PUBLIC_DEFAULT_LANGUAGE=en" \
            --build-env "NEXT_PUBLIC_AVAILABLE_LANGUAGES=en" \
            --build-env "NEXT_PUBLIC_ENABLE_MULTI_LANG=false" \
            --build-env "NEXT_PUBLIC_PUSHER_ENABLED=false"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
