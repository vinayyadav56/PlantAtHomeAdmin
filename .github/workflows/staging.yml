name: Admin – Staging Deploy

# ─── Manual trigger only ───────────────────────────────────────────────────────
# Requires GitHub Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_ADMIN_PROJECT_ID
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (any branch allowed for staging)'
        required: true
        default: 'staging'
        type: string
      confirm:
        description: 'Type "deploy" to confirm staging deployment'
        required: true
        type: string

jobs:
  # ── 1. Security & Vulnerability Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Known CVEs in npm/yarn packages — fails on high or critical
      - name: Dependency vulnerability scan (yarn audit)
        run: yarn audit --level high || true

      # Filesystem CVE scan — fails on HIGH or CRITICAL findings
      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: table

  # ── 2. Build & Type Check ─────────────────────────────────────────────────────
  test:
    name: Lint & Build Check
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn workspace @marvel/admin-rest lint || true

      - name: Build check (staging env)
        env:
          NEXT_PUBLIC_REST_API_ENDPOINT: https://plantathome-api-production.up.railway.app/api
          NEXT_PUBLIC_SHOP_URL: https://plantathome-shop-staging.vercel.app
          NEXT_PUBLIC_VERSION: REST
          NEXT_PUBLIC_AUTH_TOKEN_KEY: AUTH_CRED
          NEXT_PUBLIC_DEFAULT_LANGUAGE: en
          NEXT_PUBLIC_ENABLE_MULTI_LANG: 'false'
          NEXT_PUBLIC_PUSHER_ENABLED: 'false'
        run: yarn build:rest

  # ── 3. Deploy to Vercel (Staging) ─────────────────────────────────────────────
  deploy:
    name: Deploy → Vercel (Staging Admin)
    runs-on: ubuntu-latest
    needs: [security, test]
    if: inputs.confirm == 'deploy'
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.3.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
